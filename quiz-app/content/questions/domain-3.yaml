  - id: d3_ci_schema_01
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "3.6"
    question: |
      Your PR-review workflow currently runs Claude Code in print mode and then parses the
      free-text output with fragile regexes to create GitHub annotations. Small wording
      changes routinely break the parser, causing valid findings to disappear from the CI
      report. What is the best fix?
    options:
      A: "Keep plain text output and make the regexes more permissive so they tolerate wording changes."
      B: "Run Claude with `-p --output-format json --json-schema ...` so CI receives machine-parseable structured output in a stable shape."
      C: "Switch from `-p` to interactive mode so Claude can ask follow-up questions before returning findings."
      D: "Ask Claude to always format the report as a Markdown table and parse the table cells instead."
    correct: B
    explanation: |
      B is correct because CI integrations should consume structured output, not scrape
      conversational text. `--output-format json` returns JSON metadata, and `--json-schema`
      lets you constrain the structured result into a stable machine-readable shape. A and D
      still rely on brittle text parsing. C breaks automation because CI needs non-interactive
      execution.
    docLink:
      text: "Run Claude Code programmatically"
      url: "https://code.claude.com/docs/en/headless"
    optionLinks:
      A:
        text: "Headless usage"
        url: "https://code.claude.com/docs/en/headless"
