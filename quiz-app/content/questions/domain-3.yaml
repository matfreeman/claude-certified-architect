        url: "https://code.claude.com/docs/en/sub-agents"
      D:
        text: "Scoping codebase exploration"
        url: "https://code.claude.com/docs/en/best-practices"

  - id: d3_iterative_01
    scenario: "Code Generation with Claude Code"
    taskStatement: "3.5"
    question: |
      You ask Claude Code to refactor a date formatting utility to handle international
      formats. After three attempts, the output is inconsistent: sometimes it produces
      DD/MM/YYYY, sometimes MM-DD-YYYY, and it mishandles single-digit months. Your
      prose descriptions of the expected behavior keep being interpreted differently.
      What is the most effective way to get consistent results?
    options:
      A: "Add more detailed natural language instructions specifying every date format rule, including locale handling and zero-padding requirements."
      B: "Provide 2-3 concrete input/output examples showing the exact transformations you expect, including edge cases like single-digit months."
      C: "Switch to plan mode so Claude can analyze the existing date utility before attempting the refactor."
      D: "Break the task into smaller sub-tasks, asking Claude to handle one date format per message."
    correct: B
    explanation: |
      When natural language descriptions are interpreted inconsistently, concrete input/output
      examples are the most effective way to communicate expected transformations. Examples like
      "Input: '2024-1-5' → Output: '05/01/2024'" eliminate ambiguity that prose descriptions
      cannot resolve. More detailed prose (A) adds volume but doesn't resolve the interpretation
      inconsistency — the problem is ambiguity, not missing detail. Plan mode (C) helps with
      understanding code structure but doesn't address the specification gap. Breaking into
      sub-tasks (D) fragments the context unnecessarily when the core issue is unclear
      requirements.
    docLink:
      text: "Best practices — iterative refinement"
      url: "https://code.claude.com/docs/en/best-practices"
    optionLinks:
      A:
        text: "Providing specific context in prompts"
        url: "https://code.claude.com/docs/en/best-practices"
      B:
        text: "Concrete examples for consistent output"
        url: "https://code.claude.com/docs/en/best-practices"
      C:
        text: "Plan mode for safe exploration"
        url: "https://code.claude.com/docs/en/common-workflows"
      D:
        text: "Task decomposition strategies"
        url: "https://code.claude.com/docs/en/best-practices"

  - id: d3_iterative_02
    scenario: "Code Generation with Claude Code"
    taskStatement: "3.5"
    question: |
      You are implementing a caching layer for your API but are unfamiliar with the
      codebase's existing data access patterns, cache invalidation strategies, and
      failure modes. Rather than jumping straight to implementation, you want Claude
      to help you surface considerations you may not have anticipated. Which iterative
      approach is most appropriate?
    options:
      A: "Write a test suite first covering expected caching behavior, then have Claude implement code to pass the tests."
      B: "Use the interview pattern: ask Claude to interview you about the caching requirements, surfacing design considerations like invalidation strategies, failure modes, and edge cases before implementing."
      C: "Provide 2-3 input/output examples showing expected cache hit/miss behavior and let Claude infer the design."
      D: "Start with direct execution and iterate on the implementation as issues emerge during testing."
    correct: B
    explanation: |
      The interview pattern is specifically designed for scenarios where you're working in an
      unfamiliar domain and want to surface considerations you haven't anticipated. Having
      Claude ask about cache invalidation strategies, TTL policies, failure modes, and
      consistency requirements ensures nothing important is missed before implementation begins.
      Test-driven iteration (A) is powerful but requires you to already know what to test —
      difficult when you're unfamiliar with the design space. Input/output examples (C) work
      for transformation tasks, not architectural design. Direct execution (D) risks costly
      rework when design flaws are discovered late.
    docLink:
      text: "Best practices — let Claude interview you"
      url: "https://code.claude.com/docs/en/best-practices"
    optionLinks:
      A:
        text: "Test-driven iteration"
        url: "https://code.claude.com/docs/en/best-practices"
      B:
        text: "Interview pattern for design discovery"
        url: "https://code.claude.com/docs/en/best-practices"
      C:
        text: "Input/output examples for transformation tasks"
        url: "https://code.claude.com/docs/en/best-practices"
      D:
        text: "Direct execution vs exploration"
        url: "https://code.claude.com/docs/en/common-workflows"

  - id: d3_import_pkg_01
    scenario: "Code Generation with Claude Code"
    taskStatement: "3.1"
    question: |
      Your monorepo has shared instructions for everyone plus package-specific standards
      for `packages/web`, `services/api`, and `infra/terraform`. The root `CLAUDE.md` has
      grown to 260 lines, and frontend-only guidance is distracting backend work. You want
      to keep the root file concise while still loading package-specific guidance when
      Claude works in the relevant area. What is the best approach?
    options:
      A: "Keep everything in the root `CLAUDE.md`, but add clearer headings for each package section."
      B: "Create a `packages/web/CLAUDE.md` that imports `@./docs/web-standards.md`, and do the same per package so imports resolve relative to each package file."
      C: "Move package-specific rules into `~/.claude/CLAUDE.md` so developers can opt into the packages they work on most."
      D: "Put package standards in each package README and rely on Claude to read them when needed."
    correct: B
    explanation: |
      B is correct because `CLAUDE.md` supports `@path/to/import` syntax, and relative
      imports resolve relative to the file containing the import. Using package-level
      `CLAUDE.md` files lets you keep shared rules at the root while selectively loading
      detailed standards only when Claude works in that package. A keeps the always-loaded
      file bloated. C makes team rules personal instead of version-controlled. D depends on
      opportunistic reading rather than persistent memory loading.
    docLink:
      text: "How Claude remembers your project"
      url: "https://code.claude.com/docs/en/memory"
    optionLinks:
      A:
        text: "Keeping CLAUDE.md concise"
        url: "https://code.claude.com/docs/en/memory"
      B:
        text: "Import additional files with @ syntax"
        url: "https://code.claude.com/docs/en/memory"
      C:
        text: "User vs project CLAUDE.md scope"
        url: "https://code.claude.com/docs/en/memory"
      D:
        text: "How CLAUDE.md files load"
        url: "https://code.claude.com/docs/en/memory"

  - id: d3_memory_inspect_01
    scenario: "Code Generation with Claude Code"
    taskStatement: "3.1"
    question: |
      After reorganizing your repository, one developer says Claude is still applying an
      old security rule from a parent directory while another says the new Terraform
      guidance under `.claude/rules/` is not loading at all. Before you rewrite the memory
      hierarchy, what is the fastest way to verify exactly which memory files are active in
      the current session?
    options:
      A: "Run `/memory` to list the loaded `CLAUDE.md`, `CLAUDE.local.md`, and rules files, then open the relevant ones from there."
      B: "Ask Claude to summarize its current instructions from memory and treat that summary as authoritative."
      C: "Restart Claude Code with `--resume` so it reloads the memory stack from scratch."
      D: "Delete the root `CLAUDE.md` and let auto memory rebuild the missing instructions over time."
    correct: A
    explanation: |
      A is correct because `/memory` is the built-in way to inspect which memory files are
      loaded in the current session. It lists `CLAUDE.md`, `CLAUDE.local.md`, and rules
      files and lets you open them directly, which makes it the right first debugging step.
      B is unreliable because paraphrases can omit or blur the real source files. C resumes
      a session but does not solve the inspection problem. D is destructive and unrelated to
      debugging the active hierarchy.
