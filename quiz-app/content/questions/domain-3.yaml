      B is correct because the current workflow is missing key project context. Passing prior
      findings helps Claude report only new or unresolved issues, while giving it existing
      test files and durable testing guidance in `CLAUDE.md` reduces duplicate or off-style
      suggestions. A treats missing context as a model-size problem. C may make repetition
