      production build. One staff engineer needs extra audit steps only on their own
      machine, so they create `~/.claude/skills/release-check/SKILL.md`. After that,
      their `/release-check` no longer follows the team workflow. What is the best way
      to keep the shared project skill intact while also giving that engineer a personal
      variant?
    options:
      A: "Move the extra audit steps into `~/.claude/CLAUDE.md` so `/release-check` automatically combines both instruction sources."
      B: "Keep the personal skill named `release-check`; Claude merges same-named skills across scopes when the command is invoked."
      C: "Rename the personal skill to a different name such as `release-check-audit` under `~/.claude/skills/`, then invoke it separately when needed."
      D: "Recreate the personal workflow as `~/.claude/commands/release-check.md` so the personal command can coexist with the project skill under the same slash command."
    correct: C
    explanation: |
      C is correct because skills are discovered from personal and project locations, but
      same-named skills do not merge. Higher-priority locations win, and personal skills
      override project skills with the same name. Giving the personal variant a different
      name preserves the shared `/release-check` while adding a separate user-specific
      workflow. A is wrong because `CLAUDE.md` is always-loaded memory, not a separate
      slash-command workflow. B is wrong because same-named skills do not combine at
      invocation time; one definition wins by precedence. D is wrong because commands and
      skills use the same mechanism, and if a skill and command share a name, the skill
      takes precedence.
