      that already exist under `tests/integration/`, and on reruns it reposts issues that
      the team already fixed in the previous review cycle. The job only passes Claude the
      raw diff. Which change most directly improves output quality?
    options:
      A: "Increase the model size and token budget so Claude can infer more of the repository's testing strategy from the diff alone."
      B: "Provide prior review findings plus representative existing test files, and document project testing standards in `CLAUDE.md` so CI-invoked Claude has durable context."
      C: "Lower temperature to zero and keep the prompt unchanged so the output becomes more deterministic."
      D: "Run the workflow less often so developers see fewer repeated suggestions."
    correct: B
