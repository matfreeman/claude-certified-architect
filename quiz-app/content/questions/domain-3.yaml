    question: |
      Your company enforces special conventions for SQL migration files, but those files
      live in `services/*/db/migrations/`, `packages/reporting/sql/`, and `ops/backfills/`.
      A subdirectory `CLAUDE.md` in any one tree only covers part of the estate, and the
      root file is getting noisy. Which configuration is most maintainable?
    options:
      A: "Create one rule in `.claude/rules/sql-migrations.md` with YAML frontmatter `paths` glob patterns matching migration files across the repo."
      B: "Add a long section to the root `CLAUDE.md` describing every migration directory and expect Claude to infer when it applies."
      C: "Create a `CLAUDE.md` file in each migration directory and manually keep their contents synchronized."
      D: "Turn the migration guidance into a skill so Claude loads it automatically whenever it sees `.sql` files."
    correct: A
    explanation: |
      A is correct because path-scoped rules are designed for cross-directory conventions.
      A single `.claude/rules/` file with `paths` glob patterns lets the same instruction
      load whenever matching files are read, regardless of where they sit in the repo. B
      adds always-loaded noise. C creates duplication and drift. D is wrong because skills
      are on-demand rather than automatic path-scoped memory.
