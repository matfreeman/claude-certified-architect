  - id: d2_mcp_local_scope_01
    scenario: "Code Generation with Claude Code"
    taskStatement: "2.4"
    question: |
      You are trialing a local MCP server that connects to your personal staging
      database while debugging a code-generation issue in one repository. The server
      must load only in this project, must not be checked into version control, and
      should not appear automatically in your other repositories. Which configuration
      approach is correct?
    options:
      A: "Install it with local scope so it is stored in `~/.claude.json` for the current project only."
      B: "Add it to project-scoped `.mcp.json` so the configuration lives with the repository."
      C: "Add it as a user-scoped server in `~/.claude.json` so it is available across all projects."
      D: "Document the server in `CLAUDE.md` and tell Claude to treat that as the active MCP configuration."
    correct: A
    explanation: |
      Local scope is the right fit for a project-specific server that should stay
      private to you and out of version control. Claude Code stores local-scoped MCP
      servers in `~/.claude.json` under the current project's path. Project scope (B)
      is for shared team tooling and writes to `.mcp.json`. User scope (C) would make
      the server available across all repositories on your machine. `CLAUDE.md` (D)
      can document workflow guidance, but it does not configure MCP servers.
    docLink:
      text: "Connect Claude Code to tools via MCP"
      url: "https://code.claude.com/docs/en/mcp"
