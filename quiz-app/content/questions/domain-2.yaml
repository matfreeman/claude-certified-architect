  - id: d2_remote_auth_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "2.4"
    question: |
      You are moving an internal customer-records MCP server from a developer laptop to
      a remote Streamable HTTP deployment so several teams can use it. The server reads
      user-specific customer data and performs high-impact account actions. What is the
      best security posture?
    options:
      A: "Keep the local stdio authentication pattern and rely on roots to limit what the remote server can access."
      B: "Expose the remote server publicly without auth first, then add prompt-based approval instructions for sensitive actions."
      C: "Implement authorization for the remote HTTP server, following the OAuth-based MCP authorization model, while keeping in mind that local stdio setups usually rely on environment-based or embedded credentials instead."
      D: "Pass each user's upstream bearer token through the MCP server directly to downstream APIs to preserve identity without added complexity."
    correct: C
    explanation: |
      For remote HTTP-based MCP servers that expose sensitive, user-specific data or
      high-impact actions, authorization is strongly recommended. The official MCP
      authorization docs center on OAuth-style flows for remote servers. Local stdio
      servers are a different case and usually rely on environment-based or embedded
      credentials. Token passthrough is an anti-pattern called out by the official
      security guidance.
    docLink:
      text: "Understanding authorization in MCP"
      url: "https://modelcontextprotocol.io/docs/tutorials/security/authorization"
    optionLinks:
      A:
        text: "Roots are not a security boundary"
        url: "https://modelcontextprotocol.io/docs/learn/client-concepts"
      B:
        text: "Authorization tutorial"
        url: "https://modelcontextprotocol.io/docs/tutorials/security/authorization"
      C:
        text: "Authorization specification"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization"
      D:
        text: "Security best practices"
        url: "https://modelcontextprotocol.io/docs/tutorials/security/security_best_practices"

  - id: d2_transport_choice_01
    scenario: "Developer Productivity with Claude"
    taskStatement: "2.4"
    question: |
      Your team has two MCP integrations to design:
      1) a local filesystem helper that runs on the same developer machine as Claude Code,
      2) a shared analytics service hosted centrally for many users.
      Which transport pairing is most appropriate?
    options:
      A: "Use Streamable HTTP for the local helper and stdio for the shared analytics service so both can stream."
      B: "Use stdio for the local helper and Streamable HTTP for the shared analytics service."
      C: "Use stdio for both because MCP transport choice does not affect deployment or authentication."
      D: "Use Streamable HTTP for both because stdio cannot expose tools, resources, and prompts."
    correct: B
    explanation: |
      The official MCP architecture describes stdio as the natural fit for direct
      local process communication on the same machine, while Streamable HTTP is the
      remote transport for networked services and multi-client deployments. Transport
      choice affects connection model, deployment, and security posture.
