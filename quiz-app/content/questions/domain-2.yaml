  - id: d2_edit_fallback_01
    scenario: "Developer Productivity with Claude"
    taskStatement: "2.5"
    question: |
      While refactoring a generated API client, the line `raise ApiError(response)`
      appears 8 times in the same file. `Edit` keeps failing because the target text
      is not unique, but you only need to change the occurrence inside
      `create_invoice()`. What is the most reliable next step?
    options:
      A: "Retry `Edit` with a shorter match string so it can replace any similar occurrence."
      B: "Use Grep on every turn to search for `raise ApiError(response)` until Claude picks the right match."
      C: "Use Glob to narrow the file list further, then retry the same `Edit` operation."
      D: "Use Read to load the file, update the intended occurrence with its surrounding context, then Write the full revised file back."
    correct: D
    explanation: |
      When a targeted edit cannot identify a unique match, the reliable fallback is
      to read the full file, make the intended change in context, and write the
      updated file back. That avoids ambiguous partial replacements. Option A makes
      the ambiguity worse by broadening the match. Option B helps find occurrences
      but still does not produce a reliable single edit. Option C only narrows files,
      not duplicate text within the same file, so it does not solve the underlying
      problem.
    docLink:
      text: "Text editor tool"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/text-editor-tool"
