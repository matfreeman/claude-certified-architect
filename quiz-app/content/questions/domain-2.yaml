  - id: d2_validation_retry_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "2.2"
    question: |
      Your support agent uses an MCP tool named `schedule_callback` to book customer
      callbacks. In 14% of cases, Claude sends values like "Friday afternoon" or a
      timestamp outside staffed hours; the tool's server-side checks reject them
      because the callback must be a future ISO-8601 time during business hours.
      The tool currently returns a JSON-RPC `-32602 Invalid params` error, and logs
      show the agent repeats the same bad call pattern before giving up. What
      change best improves autonomous recovery?
    options:
      A: "Keep returning JSON-RPC protocol errors for invalid callback times, because argument validation failures should stay outside the model's context."
      B: "Silently coerce invalid callback times to the next available slot and return success so the conversation can continue."
      C: "Return a tool result with `isError: true` and a specific validation message describing the time constraint so Claude can correct the arguments and retry."
      D: "Return `isError: false` with an empty result and let the coordinator infer that another tool call is needed."
    correct: C
    explanation: |
      Input validation errors should be returned as tool execution errors with
      `isError: true` and actionable feedback, because that gives the model the
      information it needs to self-correct and retry with adjusted parameters.
      Option A is wrong because protocol errors are for malformed requests, unknown
      tools, and similar request-level problems; they are less useful for model
      recovery on semantic validation failures. Option B is wrong because silent
      coercion hides the constraint violation and can book a time the customer did
      not request. Option D is wrong because a false-success payload makes the
      validation failure indistinguishable from a legitimate empty result, which
      undermines reliable retry behavior.
    docLink:
      text: "SEP-1303: Input Validation Errors as Tool Execution Errors"
      url: "https://modelcontextprotocol.io/seps/1303-input-validation-errors-as-tool-execution-errors"
    optionLinks:
      A:
        text: "MCP tools spec — protocol errors vs tool execution errors"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/server/tools#error-handling"
      B:
        text: "MCP tools spec — tool execution errors should carry actionable feedback"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/server/tools#error-handling"
      C:
        text: "SEP-1303 — validation errors should be visible to the model"
        url: "https://modelcontextprotocol.io/seps/1303-input-validation-errors-as-tool-execution-errors"
      D:
        text: "MCP tools spec — use `isError` to distinguish failures from normal results"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/server/tools#error-handling"

  - id: d2_mcp_architecture_01
    scenario: "Developer Productivity with Claude"
    taskStatement: "2.4"
    question: |
      A teammate says, "Claude Code connects directly to our GitHub MCP server, so the
      server is effectively the MCP client and can talk to the model however it wants."
      Which explanation is most accurate?
    options:
      A: "Claude Code is the MCP host. It creates an MCP client for each connected server, and the server exposes capabilities through that client connection rather than talking directly to the model."
      B: "The GitHub MCP server is both the host and the client because it exposes tools that Claude can call."
      C: "The model itself is the MCP client, so the host and client are interchangeable terms."
      D: "Each MCP server becomes the host for its own tools after connection, so there is no meaningful client layer."
    correct: A
    explanation: |
      The official MCP architecture distinguishes the host, client, and server. The
      host is the user-facing AI application, such as Claude Code. It creates one MCP
      client per MCP server connection. The server exposes capabilities over the
      protocol, but it does not become the host and it does not talk directly to the
      model outside the host-client-server relationship.
    docLink:
      text: "MCP architecture overview"
      url: "https://modelcontextprotocol.io/docs/learn/architecture"
    optionLinks:
      A:
        text: "Host, client, and server roles"
        url: "https://modelcontextprotocol.io/docs/learn/architecture"
      B:
        text: "Understanding MCP servers"
        url: "https://modelcontextprotocol.io/docs/learn/server-concepts"
      C:
        text: "Understanding MCP clients"
        url: "https://modelcontextprotocol.io/docs/learn/client-concepts"
      D:
        text: "Architecture participants"
        url: "https://modelcontextprotocol.io/docs/learn/architecture"

  - id: d2_primitives_mapping_01
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "2.4"
    question: |
      You want an MCP integration for release management with three needs:
      1) show the current release checklist and open blockers without extra exploratory calls,
      2) let Claude create a release note draft in your tracker,
      3) give users a reusable "prepare release" workflow they can invoke explicitly.
      Which mapping best fits MCP's primitives?
    options:
      A: "Use tools for all three so the model can decide everything automatically."
      B: "Use a resource for the checklist/blocker catalog, a tool for creating the release note draft, and a prompt for the reusable prepare-release workflow."
      C: "Use prompts for the checklist and blockers, resources for the draft action, and a tool only for the reusable workflow."
      D: "Use resources for all three so the host can surface them uniformly."
    correct: B
    explanation: |
      MCP's primitives have different controllers and jobs. Resources are application-driven
      context and are a strong fit for stable catalogs like release checklists or blocker
      summaries. Tools are model-controlled actions and fit the draft-creation operation.
      Prompts are user-controlled reusable templates, which makes them the right fit for
      an explicit prepare-release workflow.
    docLink:
      text: "Understanding MCP servers"
      url: "https://modelcontextprotocol.io/docs/learn/server-concepts"
    optionLinks:
      A:
        text: "Tools are model-controlled actions"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/server/tools"
      B:
        text: "Tools, resources, and prompts together"
        url: "https://modelcontextprotocol.io/docs/learn/server-concepts"
      C:
        text: "Prompts are user-controlled"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/server/prompts"
      D:
        text: "Resources are contextual, not action-taking"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/server/resources"

  - id: d2_roots_boundary_01
    scenario: "Code Generation with Claude Code"
    taskStatement: "2.4"
    question: |
      You connect a filesystem-oriented MCP server to help with project work and expose
      `file:///Users/dev/project` as a root. A teammate argues this is enough security
      because the root prevents the server from touching anything else on the machine.
      What is the best response?
    options:
      A: "Correct. Roots are the primary filesystem security mechanism in MCP and should be treated as hard enforcement boundaries."
      B: "Mostly correct. Roots are advisory for browsing but become hard security boundaries once the server supports resources."
      C: "Incorrect. Roots are coordination hints that help trusted servers stay in scope; real protection still comes from OS permissions, sandboxing, and user trust."
      D: "Incorrect only for remote servers. For local stdio servers, roots are mandatory security enforcement."
    correct: C
    explanation: |
      The official MCP client concepts and roots docs are explicit that roots are a
      coordination mechanism, not a hard security boundary. They help well-behaved,
      trusted servers understand what is in scope, but they do not replace operating
      system permissions, sandboxing, or other real security controls.
    docLink:
      text: "Understanding MCP clients"
      url: "https://modelcontextprotocol.io/docs/learn/client-concepts"
    optionLinks:
      A:
        text: "Roots specification"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/client/roots"
      B:
        text: "Roots design philosophy"
        url: "https://modelcontextprotocol.io/docs/learn/client-concepts"
      C:
        text: "Roots are coordination, not security"
        url: "https://modelcontextprotocol.io/docs/learn/client-concepts"
      D:
        text: "Client roots capability"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/client/roots"

  - id: d2_inspector_debugging_01
    scenario: "Developer Productivity with Claude"
    taskStatement: "2.4"
    question: |
      You built a new local MCP server and added it to configuration, but Claude does
      not appear to surface any of its capabilities. Before rewriting prompts or
      changing tool descriptions, what is the best first debugging step?
    options:
      A: "Open the server with MCP Inspector, verify connectivity, and inspect the initialize exchange and advertised capabilities."
      B: "Add several prompt examples to teach Claude how to discover the missing capabilities."
      C: "Convert the server from stdio to Streamable HTTP because local transports do not support capability negotiation."
      D: "Wrap every server response in a prompt template so Claude sees the tools as prompts instead."
    correct: A
    explanation: |
      The official MCP debugging guidance recommends Inspector as the first stop. It
      lets you validate connectivity, inspect tools/resources/prompts, and verify the
      initialize exchange and negotiated capabilities. If the server is not exposing
      what you expect, fix the protocol connection first rather than compensating with
      prompt changes.
    docLink:
      text: "Debugging MCP integrations"
      url: "https://modelcontextprotocol.io/docs/tools/debugging"
