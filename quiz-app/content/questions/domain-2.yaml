  - id: d2_validation_retry_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "2.2"
    question: |
      Your support agent uses an MCP tool named `schedule_callback` to book customer
      callbacks. In 14% of cases, Claude sends values like "Friday afternoon" or a
      timestamp outside staffed hours; the tool's server-side checks reject them
      because the callback must be a future ISO-8601 time during business hours.
      The tool currently returns a JSON-RPC `-32602 Invalid params` error, and logs
      show the agent repeats the same bad call pattern before giving up. What
      change best improves autonomous recovery?
    options:
      A: "Keep returning JSON-RPC protocol errors for invalid callback times, because argument validation failures should stay outside the model's context."
      B: "Silently coerce invalid callback times to the next available slot and return success so the conversation can continue."
      C: "Return a tool result with `isError: true` and a specific validation message describing the time constraint so Claude can correct the arguments and retry."
      D: "Return `isError: false` with an empty result and let the coordinator infer that another tool call is needed."
    correct: C
    explanation: |
      Input validation errors should be returned as tool execution errors with
      `isError: true` and actionable feedback, because that gives the model the
      information it needs to self-correct and retry with adjusted parameters.
      Option A is wrong because protocol errors are for malformed requests, unknown
      tools, and similar request-level problems; they are less useful for model
      recovery on semantic validation failures. Option B is wrong because silent
      coercion hides the constraint violation and can book a time the customer did
      not request. Option D is wrong because a false-success payload makes the
      validation failure indistinguishable from a legitimate empty result, which
      undermines reliable retry behavior.
    docLink:
      text: "SEP-1303: Input Validation Errors as Tool Execution Errors"
      url: "https://modelcontextprotocol.io/seps/1303-input-validation-errors-as-tool-execution-errors"
    optionLinks:
      A:
        text: "MCP tools spec — protocol errors vs tool execution errors"
        url: "https://modelcontextprotocol.io/specification/2025-11-25/server/tools#error-handling"
      B:
