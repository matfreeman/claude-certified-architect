  - id: d2_namespacing_01
    scenario: "Developer Productivity with Claude"
    taskStatement: "2.1"
    question: |
      Your internal `release_ops` MCP server exposes GitHub, Jira, and Slack actions
      through tools named `search`, `list_open`, and `post_update`. In the last 50
      release-status investigations, Claude sent 9 calls to the wrong backend even
      though each description mentions the service name. Which redesign most directly
      improves tool selection reliability without adding an external router?
    options:
      A: "Rename the tools with explicit service namespaces and update descriptions, for example `github_list_pull_requests`, `jira_search_issues`, and `slack_post_release_update`."
      B: "Keep the tool names and add a longer system prompt describing your release workflow."
      C: "Dynamically disconnect all but one backend before each turn so Claude can only see one service at a time."
      D: "Add `input_examples` to every tool, even though the primary failure is choosing the wrong service rather than formatting arguments."
    correct: A
    explanation: |
      Meaningful namespacing makes tool selection more unambiguous as a tool library
      grows, especially when several tools span different services and do related
      work. Option A directly clarifies purpose at the interface level. Option B adds
      more prompt text but still leaves the ambiguous tool names in place. Option C
      is operationally expensive and prevents natural cross-system work in a single
      turn. Option D is useful for complex input shapes, but it does not solve the
      service-selection ambiguity that is driving the misroutes.
    docLink:
