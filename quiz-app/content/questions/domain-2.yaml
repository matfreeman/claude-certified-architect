        url: "https://code.claude.com/docs/en/memory"
      D:
        text: "Secrets management best practices"
        url: "https://code.claude.com/docs/en/mcp"

  - id: d2_builtins
    taskStatement: "2.5"
    question: |
      While exploring a large codebase, you need to find all files that call a function
      named processPayment. Which built-in tool and approach is most appropriate?
    options:
      A: "Use Glob with pattern **/*.ts to find all TypeScript files, then Read each one to search for the function name."
      B: "Use Read on the main application entry point and follow its imports to trace where processPayment is called."
      C: "Use Grep with the pattern processPayment to search file contents across the codebase."
      D: "Use Glob with pattern *processPayment* to find files whose names contain the function name."
    correct: C
    explanation: |
      Grep is designed for content search — finding patterns within file contents. This is
      exactly what's needed to locate all callers of processPayment. Glob (A, D) is for file
      path pattern matching (finding files by name/extension), not searching inside files.
      Reading the entry point and following imports (B) would miss indirect callers and is
      inefficient for a large codebase.
    docLink:
      text: "Built-in tools — Grep, Glob, Read"
      url: "https://code.claude.com/docs"
    optionLinks:
      A:
        text: "Glob tool — file path pattern matching"
        url: "https://code.claude.com/docs"
      B:
        text: "Read tool — reading specific files"
        url: "https://code.claude.com/docs"
      C:
        text: "Grep tool — searching file contents"
        url: "https://code.claude.com/docs"
      D:
        text: "Glob patterns — filename vs content search"
        url: "https://code.claude.com/docs"

  - id: d2_error_types
    taskStatement: "2.2"
    question: |
      Your process_refund MCP tool returns a business error: the refund was rejected
      because the customer is outside the return window. How should this error be
      structured to enable appropriate agent behavior?
    options:
      A: "Return isError: true with errorCategory: 'transient' and isRetryable: true so the agent retries later."
      B: "Return isError: true with errorCategory: 'business', isRetryable: false, and a customer-friendly explanation of the policy."
      C: "Return isError: true with a generic message 'Operation failed' to keep the response format consistent."
      D: "Throw an exception and let the coordinator's top-level error handler decide how to respond."
    correct: B
    explanation: |
      Business errors (policy violations like expired return windows) are non-retryable.
      Returning structured metadata with errorCategory: "business", isRetryable: false, and
      a human-readable explanation lets the agent communicate the reason to the customer
      without wasting retry attempts. Categorizing it as "transient" (A) would cause needless
      retries. A generic message (C) prevents the agent from making appropriate decisions.
      Throwing exceptions (D) propagates to the coordinator unnecessarily.
    docLink:
      text: "MCP structured error responses"
      url: "https://modelcontextprotocol.io/introduction"
    optionLinks:
      A:
        text: "Transient errors and isRetryable flag"
        url: "https://modelcontextprotocol.io/introduction"
      B:
        text: "Business errors — errorCategory in MCP"
        url: "https://modelcontextprotocol.io/introduction"
      C:
        text: "Generic vs structured error messages"
        url: "https://modelcontextprotocol.io/introduction"
      D:
        text: "Exception propagation in agent architectures"
        url: "https://code.claude.com/docs/en/agent-sdk/overview"

  - id: d2_mcp_resources
    scenario: "Developer Productivity with Claude"
    taskStatement: "2.4"
    question: |
      Your developer productivity agent uses an MCP server connected to your issue
      tracker. Engineers frequently ask "what issues are assigned to me?" which triggers
      the agent to make 3-4 exploratory tool calls (list projects, list sprints, filter
      by assignee) before returning results. This adds 8-12 seconds of latency to every
      request. The issue tracker's data structure rarely changes. What is the most
      effective architectural improvement?
    options:
      A: "Cache the results of exploratory tool calls in the agent's conversation context so subsequent requests skip the exploration."
      B: "Expose a content catalog as an MCP resource (e.g., current sprint issues, user assignments) so the agent has visibility into available data without requiring exploratory tool calls."
      C: "Create a single consolidated tool that combines all three queries into one API call."
      D: "Add detailed instructions to the system prompt explaining the optimal query sequence to reduce unnecessary exploratory calls."
    correct: B
    explanation: |
      MCP resources are specifically designed to expose content catalogs (issue summaries,
      documentation hierarchies, database schemas) to give agents visibility into available data
      without requiring exploratory tool calls. By exposing current sprint issues and user
      assignments as resources, the agent can directly access the data structure without the
      discovery overhead. Conversation caching (A) only helps within a single session and goes
      stale. A consolidated tool (C) reduces calls but doesn't eliminate the need for the agent
      to discover what's available. System prompt instructions (D) are probabilistic and don't
      address the fundamental need for the agent to discover the data structure.
    docLink:
      text: "MCP resources and content catalogs"
      url: "https://code.claude.com/docs/en/mcp"
    optionLinks:
      A:
        text: "Conversation context caching"
        url: "https://platform.claude.com/docs/en/build-with-claude/context-windows"
      B:
        text: "MCP resources — exposing content catalogs"
        url: "https://code.claude.com/docs/en/mcp"
      C:
        text: "Tool consolidation patterns"
        url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/overview"
      D:
        text: "System prompt guidance for tool sequencing"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"

  - id: d2_prompt_boundary_01
    scenario: "Multi-Agent Research System"
    taskStatement: "2.1"
    question: |
      Your research system has two tools: `extract_web_results` for live URLs and
      `analyze_pdf_brief` for uploaded PDFs. After a prompt update, 22% of requests
      that include a news URL now call `analyze_pdf_brief` first, even though both
      tool descriptions already explain their boundaries in 4 sentences. Review shows
      the system prompt says "Always analyze documents thoroughly before answering"
      and repeatedly refers to web pages as documents. What is the best first fix?
    options:
      A: "Add 6-8 `input_examples` to both tools showing valid argument objects for typical requests."
      B: "Force `extract_web_results` whenever the user message contains `http` or `www`."
      C: "Rewrite the system prompt to remove keyword-sensitive wording that blurs the boundary between the two tools while keeping the detailed descriptions."
      D: "Rename `analyze_pdf_brief` to `review_pdf_brief` and leave the prompt unchanged."
    correct: C
    explanation: |
      Claude's tool-use prompt is constructed from the tool definitions plus your
      user-specified system prompt, so keyword-sensitive prompt wording can override
      otherwise solid tool boundaries. Option C addresses the root cause: the prompt
      language is teaching the model to associate web pages with the PDF tool.
      Option A can help with argument formatting for complex tools, but it does not
      fix the incorrect selection cue. Option B is brittle because some URLs point
      to PDFs or other content that may legitimately need a different tool. Option D
      may reduce a little overlap, but it leaves the misleading prompt instruction
      intact.
    docLink:
      text: "Define tools"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/define-tools"
    optionLinks:
      A:
        text: "Providing tool use examples"
