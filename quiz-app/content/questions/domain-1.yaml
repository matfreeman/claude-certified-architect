        url: "https://code.claude.com/docs/en/agent-sdk/overview"

  - id: d1_resume
    taskStatement: "1.7"
    question: |
      You are resuming a long codebase investigation session from yesterday. Since the
      session ended, several key files in the authentication module were refactored. What
      is the most effective resumption strategy?
    options:
      A: "Resume the session with --resume and explicitly inform the agent about which files changed, so it can re-analyze just those."
      B: "Simply run --resume; the agent will detect file system changes automatically."
      C: "Start a completely new session since any prior tool results involving changed files are now stale."
      D: "Use fork_session to create a branch and then re-analyze all files from scratch within the branch."
    correct: A
    explanation: |
      The recommended approach when resuming after file changes is to inform the agent about
      specific file changes for targeted re-analysis, rather than requiring full re-exploration.
      The agent cannot detect file system changes automatically. Starting fresh (C) wastes all
      the valid prior investigation context. fork_session (D) is for exploring divergent
      approaches, not for incremental re-analysis.
    docLink:
      text: "Claude Code session management"
      url: "https://code.claude.com/docs"
    optionLinks:
      A:
        text: "--resume with targeted re-analysis"
        url: "https://code.claude.com/docs"
      B:
        text: "Automatic change detection limitations"
        url: "https://code.claude.com/docs"
      C:
        text: "Starting fresh vs resuming sessions"
        url: "https://code.claude.com/docs"
      D:
        text: "fork_session — when to use branching"
        url: "https://code.claude.com/docs"
