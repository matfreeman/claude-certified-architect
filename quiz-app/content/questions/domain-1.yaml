  - id: d1_refinement_loop_01
    scenario: "Multi-Agent Research System"
    taskStatement: "1.2"
    question: |
      Your coordinator produces an initial brief on "AI risks in hospital billing," but
      product reviewers keep flagging the same gap: the final synthesis often notes that
      denial-management evidence is thin and then stops anyway. Today 22% of published
      briefs require manual follow-up research. Which orchestration change best improves
      coverage without blindly rerunning the full pipeline every time?
    options:
      A: "Expand the synthesis prompt so it infers the missing denial-management section from adjacent evidence when the source set is thin."
      B: "Have the coordinator evaluate synthesis output for explicit gaps, re-delegate targeted search and analysis tasks, then invoke synthesis again until coverage is sufficient."
      C: "Run every request through search, document analysis, and synthesis twice, regardless of what the first pass found."
      D: "Give the synthesis agent direct access to search tools so it can fill gaps on its own without going back through the coordinator."
    correct: B
    explanation: |
      B is correct because the coordinator should own iterative refinement: inspect the
      synthesized result for missing coverage, issue focused follow-up work, and then
      re-synthesize. A is wrong because it asks the synthesis agent to speculate beyond the
      evidence instead of closing the research gap. C is wrong because always rerunning the
      full pipeline is expensive and ignores the value of targeted redelegation. D is wrong
      because it bypasses the coordinator's routing, observability, and controlled
      information flow.
