  - id: d1_fixed_pipeline_extraction_01
    scenario: "Structured Data Extraction"
    taskStatement: "1.6"
    question: |
      Your contract-ingestion workflow must always perform the same four checks in order:
      identify the parties, capture renewal and termination dates, extract data-processing
      clauses, and then run a final consistency review. The current agent attempts all four
      tasks in one pass and misses one of the required sections in 11% of files. Which
      decomposition strategy is the best fit?
    options:
      A: "Let one general-purpose extractor inspect each contract holistically so it can decide the most natural order for the four checks."
      B: "Use dynamic adaptive decomposition that replans after each paragraph so later steps depend on whatever the model notices first."
      C: "Fork the session into four branches and run one required check in each branch manually before comparing the outputs."
      D: "Use prompt chaining with a fixed sequential pass for each known extraction requirement, then merge those pass results into the final record."
    correct: D
    explanation: |
      D is correct because this is a predictable multi-step workflow with known stages, so a
      fixed sequential pipeline reduces omissions and keeps the review criteria explicit. A
      is wrong because a single holistic pass reintroduces the attention dilution that is
      causing missed sections. B is wrong because adaptive replanning is more appropriate
      for open-ended investigations than for a stable checklist. C is wrong because session
      forking is for divergent explorations, not for implementing a repeatable extraction
      pipeline.
