  - id: d1_selective_routing_01
    scenario: "Multi-Agent Research System"
    taskStatement: "1.2"
    question: |
      Your coordinator currently sends every research request through search, document
      analysis, and synthesis subagents. In production, 68% of requests are simple factual
      lookups such as "When did vendor X launch model Y?" that are answered by the first
      search hit, yet they still incur the full three-agent pipeline and push p95 latency
      from 11 seconds to 29 seconds. Which orchestration change best addresses the root
      cause?
    options:
      A: "Increase the coordinator's available context window so the synthesis subagent can process the full pipeline with fewer truncation risks."
      B: "Invoke the search, analysis, and synthesis subagents in parallel for every request so the fixed pipeline finishes faster."
      C: "Have the coordinator assess request complexity up front and invoke only the subagents needed for that case, reserving the full pipeline for broad multi-source research."
      D: "Replace the specialized subagents with one general-purpose research subagent so every request follows a single delegation path."
    correct: C
    explanation: |
      C is correct because the coordinator should decide which specialists are needed for a
      given request instead of always routing through the full pipeline. This matches the
      coordinator-subagent pattern: simple lookups can stop after the minimal necessary
      step, while broad research can still invoke additional agents for analysis and
      synthesis. A is wrong because a larger context window does not remove unnecessary
      subagent hops or tool calls. B is wrong because parallelizing unneeded work still
      wastes tokens and forces analysis/synthesis even when a single lookup is sufficient.
      D is wrong because collapsing specialization into one catch-all agent weakens routing
      by query complexity and increases prompt bloat.
