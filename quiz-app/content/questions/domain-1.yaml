  - id: d1_subagent_spawn_01
    scenario: "Multi-Agent Research System"
    taskStatement: "1.3"
    question: |
      You define `researcher`, `analyst`, and `synthesizer` subagents in your Agent SDK
      application and prompt the coordinator to fan out across web, PDF, and spreadsheet
      sources. In production traces, the coordinator keeps doing all the work itself and no
      `Agent` or legacy `Task` tool calls ever appear. Which configuration change most
      directly enables subagent spawning?
    options:
      A: "Add `Agent` to each subagent's own tool list so the workers can register themselves with the coordinator."
      B: "Include `Agent` in the coordinator's `allowed_tools`; without that tool, the coordinator cannot invoke subagents even if they are defined."
      C: "Move the agent definitions into `CLAUDE.md` so the coordinator loads them before the system prompt."
      D: "Set `tool_choice: \"any\"` so Claude is forced to spawn a subagent before it can answer."
    correct: B
    explanation: |
      B is correct because the coordinator can only spawn subagents through the `Agent`
      tool, and SDK traces may still show the older `Task` name in some compatibility
      contexts. If `Agent` is missing from the coordinator's allowed tools, the definitions
      exist but are unusable. A is wrong because subagents do not self-register and should
      not be given subagent-spawning capability. C is wrong because subagent definitions are
      configured through the SDK `agents` parameter or subagent files, not by placing them
      in `CLAUDE.md`. D is wrong because `tool_choice` cannot force use of a tool the
      coordinator does not actually have.
    docLink:
      text: "Subagents in the SDK"
      url: "https://code.claude.com/docs/en/agent-sdk/subagents"
    optionLinks:
      A:
        text: "Subagent tool restrictions"
