  - id: d1_policy_hook_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "1.5"
    question: |
      Compliance policy requires human approval for any refund above $500. An audit shows
      three autonomous refunds above that threshold after the agent saw notes like "VIP
      customer" and called `process_refund` directly. Which implementation gives the most
      reliable enforcement with the least architectural sprawl?
    options:
      A: "Add a `PreToolUse` hook that inspects outgoing `process_refund` calls, denies amounts above $500, and redirects the agent toward the human escalation path."
      B: "Add a stronger system prompt instructing Claude to escalate any refund above $500 instead of refunding it."
      C: "Create a `verify_refund_policy` tool and rely on Claude to call it before every refund."
      D: "Lower temperature and add more examples of high-value refund escalations."
    correct: A
    explanation: |
      A is correct because a hook can deterministically intercept the outgoing tool call,
      block policy-violating actions, and steer the workflow to the approved path before the
      refund executes. B is wrong because prompt instructions are probabilistic and cannot
      guarantee compliance for a hard business rule. C is wrong because adding another tool
      still relies on the model to remember to call it before every refund. D is wrong
      because tuning sampling and examples may improve behavior, but it still cannot enforce
      a guaranteed approval gate.
