  - id: d1_parallel_resolution_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "1.4"
    question: |
      After identity verification is complete, a customer asks about a duplicate charge, a
      missing shipment, and loyalty points that disappeared after the order was edited.
      Your current agent investigates those issues one after another, repeats customer
      context in each pass, and has pushed median resolution time from 3.2 minutes to 5.0
      minutes. Which redesign best fits this workflow?
    options:
      A: "Add few-shot examples showing ideal multi-issue support conversations so Claude learns the desired order."
      B: "Send the entire raw transcript to a single general-purpose subagent and let it decide which issue matters most."
      C: "Force the same tool sequence for every ticket: `get_customer`, `lookup_order`, `process_refund`, then `escalate_to_human`."
      D: "Split the verified request into separate concern tracks, investigate each issue in parallel using the shared customer context, then synthesize one unified response."
    correct: D
    explanation: |
      D is correct because multi-concern support requests should be decomposed into distinct
      issues that can be investigated in parallel once prerequisite verification is done,
      then merged into a single customer-facing resolution. A is wrong because prompt-only
      guidance does not change the underlying sequential workflow or remove repeated work. B
      is wrong because handing the entire transcript to one generalist agent preserves the
      monolithic investigation pattern instead of structuring the work. C is wrong because a
      fixed universal tool order is brittle and will execute irrelevant or unsafe steps for
      many tickets.
    docLink:
      text: "Subagents in the SDK"
      url: "https://code.claude.com/docs/en/agent-sdk/subagents"
    optionLinks:
      A:
        text: "Prompting best practices"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices"
      B:
