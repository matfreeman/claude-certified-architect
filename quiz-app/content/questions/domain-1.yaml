  - id: d1_stale_session_summary_01
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "1.7"
    question: |
      Yesterday's investigation session analyzed a deployment repository on your laptop.
      Overnight, an autoformat plus refactor touched 60 files, and today's follow-up work
      must run on a fresh CI runner with no local session history. You still want the prior
      reasoning, but many tool results are now stale. What is the best next step?
    options:
      A: "Copy the old session file to the CI runner and resume it so the full transcript is preserved."
      B: "Start a fresh session and inject a structured summary of the prior findings plus the current objective."
      C: "Fork the old session before moving to CI so the stale transcript is preserved in a clean branch."
      D: "Resume the old session and ask the agent to trust earlier tool results for unchanged directories."
    correct: B
    explanation: |
      B is correct because when prior tool results are stale and the work has moved to a new
      host, a fresh session with a structured summary is more reliable than attempting to
      reuse the old transcript wholesale. A is wrong because shipping session files across
      hosts preserves stale tool outputs and adds operational fragility. C is wrong because
      forking helps compare divergent approaches from a valid baseline, not salvage a stale
      one. D is wrong because it still anchors the run to outdated results and assumes the
      model can safely separate valid from invalid prior state on its own.
