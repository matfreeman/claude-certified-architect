  - id: d1_loop_02
    scenario: "Customer Support Resolution Agent"
    taskStatement: "1.1"
    question: |
      You are implementing an agentic loop for a customer support agent using the Claude
      API. During testing, you notice the loop occasionally terminates prematurely — the
      agent stops after its first tool call even when the customer's issue requires
      multiple tool calls to resolve. Your loop termination check inspects whether the
      assistant's response contains a text content block. What is wrong with this approach?
    options:
      A: "Text content blocks are not returned when tools are called, so the check never triggers."
      B: "Claude may include both text content and tool_use blocks in the same response, so checking for text content is not a reliable termination signal — use stop_reason instead."
      C: "The text content check only works for single-turn conversations and fails in multi-turn agentic loops."
      D: "Text blocks are only returned in streaming mode and are omitted in non-streaming API responses."
    correct: B
    explanation: |
      Claude can include both text content (e.g., reasoning or status updates to the user) and
      tool_use blocks in the same response. Checking for the presence of text as a termination
      signal is an anti-pattern because it may trigger even when tools still need execution. The
      correct approach is to check stop_reason: continue when stop_reason is "tool_use" and
      terminate when stop_reason is "end_turn". Option A is incorrect — Claude often includes
      explanatory text alongside tool calls. Options C and D describe behaviors that don't exist.
    docLink:
      text: "How tool use works — the agentic loop"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/how-tool-use-works"
    optionLinks:
      A:
        text: "Tool use response structure"
        url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/how-tool-use-works"
      B:
        text: "stop_reason for agentic loop control"
        url: "https://platform.claude.com/docs/en/build-with-claude/handling-stop-reasons"
      C:
        text: "Multi-turn tool use conversations"
        url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/how-tool-use-works"
      D:
        text: "Streaming vs non-streaming responses"
        url: "https://platform.claude.com/docs/en/build-with-claude/streaming"

  - id: d1_tool_results_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "1.1"
    question: |
      Your customer support agent calls `lookup_order` successfully, but on the next loop
      iteration Claude asks to call `lookup_order` again instead of deciding whether to
      refund or escalate. Logs show your application sends a fresh request after each tool
      execution containing only the original user message and the tool schema. What change
      most directly fixes the loop behavior?
    options:
      A: "Keep tool outputs in application memory and send Claude a short natural-language summary only after all tool calls finish."
      B: "Hard-code a rule that whenever `lookup_order` succeeds, the application should call `process_refund` next."
      C: "Send the assistant's prior `tool_use` response and a new user message containing the `tool_result` blocks on the next request so Claude can reason over the fetched order data."
      D: "Increase the maximum loop iteration limit from 3 to 10 so Claude has more chances to reach the refund step."
    correct: C
    explanation: |
      C is correct because client-executed tool use requires a conversational loop: after a
      `tool_use` response, your application must send back the assistant response plus a
      user message containing the `tool_result` blocks so Claude can reason about the new
      information. A is wrong because hidden application state is not part of Claude's
      context, so the model still lacks the actual tool results it needs. B is wrong
      because it replaces model-driven reasoning with a brittle decision tree that may skip
      needed investigation or escalation steps. D is wrong because a higher iteration cap
      treats the symptom; the loop is missing state, so extra turns do not solve the root
      cause.
    docLink:
      text: "How tool use works — client-side agentic loop"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/how-tool-use-works"
    optionLinks:
