  - id: d1_subagent_permission_hook_01
    scenario: "Developer Productivity with Claude"
    taskStatement: "1.5"
    question: |
      Your repo-audit coordinator fans out to three read-only subagents. Each worker pauses
      on the same `Read` and `Grep` permission prompts, stretching a 90-second audit into
      seven minutes. You need deterministic behavior for those safe read-only tools without
      granting blanket write or shell access. What change best fits the SDK?
    options:
      A: "Add a `PreToolUse` hook or narrowly scoped permission rule that auto-approves only `Read` and `Grep` for subagent sessions."
      B: "Give all subagents unrestricted access to every built-in tool so prompts never appear."
      C: "Add a stronger system prompt stating that `Read` and `Grep` are always approved."
      D: "Lower temperature so the model is less likely to ask for permission."
    correct: A
    explanation: |
      A is correct because hook-based interception or an equivalent narrow permission rule
      provides deterministic approval for the specific safe tools involved, while keeping
      broader capabilities constrained. B is wrong because it over-expands permissions far
      beyond the problem you are solving. C is wrong because prompt text cannot enforce a
      permission decision. D is wrong because sampling settings do not control the
      permission model.
