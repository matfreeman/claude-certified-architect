  - id: d1_review_chaining_01
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "1.6"
    question: |
      Your CI review agent analyzes a 14-file payment retry refactor in one monolithic
      pass. It reliably catches local style issues, but it keeps missing regressions caused
      by interactions between retry budgets, circuit breakers, and the shared error mapper.
      Which decomposition strategy is the best fit for this kind of review?
    options:
      A: "Increase the available context window and ask Claude to review all 14 files at once with more detail."
      B: "Use dynamic adaptive decomposition to map the whole repository first, then create a broad investigation plan before reviewing the changed files."
      C: "Use prompt chaining: run local analysis on each changed file first, then perform a dedicated cross-file integration pass over the combined findings."
      D: "Assign the full pull request to one specialized subagent so a single reviewer owns the entire analysis end to end."
    correct: C
    explanation: |
      C is correct because a bounded code review is a predictable multi-step workflow: a
      first pass can find file-local issues, and a second integration pass can reason about
      cross-file behavior without attention dilution. A is wrong because a larger context
      window does not fix the decomposition problem; it still asks one pass to do two
      different review jobs at once. B is wrong because dynamic repo-wide planning is more
      appropriate for open-ended investigations than for a specific pull request review. D
      is wrong because a single subagent still collapses local and integration analysis into
      one pass instead of structuring them separately.
