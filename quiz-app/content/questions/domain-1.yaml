  - id: d1_handoff_summary_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "1.4"
    question: |
      Your support agent correctly verifies the customer, checks shipment events, and
      determines that a lost parcel now requires a manual carrier claim. The escalation is
      technically routed to a human, but the human queue receives only a generic "please
      review" note and does not have transcript access. Average handle time on these cases
      has increased 38%. What should the agent send at handoff?
    options:
      A: "The full raw conversation transcript plus every tool payload so the human can reconstruct the case from scratch."
      B: "A brief note saying the model is uncertain and the human should review the order manually."
      C: "A structured escalation summary with the verified customer ID, affected order, root cause, steps already completed, amount at risk, and the recommended next action."
      D: "A polished apology message for the customer so the human can reuse the wording if needed."
    correct: C
    explanation: |
      C is correct because a structured handoff preserves the operational facts a human
      needs when they cannot inspect the full transcript. A is wrong because dumping the
      entire transcript and raw tool data forces the human to re-investigate the case.
      B is wrong because it communicates uncertainty without the actionable details needed
      to continue the workflow. D is wrong because customer-facing language does not replace
      the internal case summary required for an effective handoff.
