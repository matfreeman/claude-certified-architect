        url: "https://platform.claude.com/docs/en/build-with-claude/tool-use"

  - id: d4_retry
    taskStatement: "4.4"
    question: |
      Your extraction system validates that line item totals sum to the invoice total.
      In 8% of cases, extracted values don't sum correctly (e.g., line items total $1,234
      but stated_total is $1,200). What is the most effective remediation?
    options:
      A: "Lower the minimum confidence threshold to accept extractions with minor discrepancies (< 5%)."
      B: "Implement a retry that appends the specific validation error to the original document and failed extraction, asking the model to correct the discrepancy."
      C: "Use the Message Batches API to reprocess failed extractions overnight with a different prompt."
      D: "Add few-shot examples showing correct line-item summation for similar document types."
    correct: B
    explanation: |
      Retry-with-error-feedback appends specific validation errors to the prompt on retry to
      guide the model toward correction. For semantic errors like arithmetic inconsistencies,
      this approach is effective because the information is present in the document — the
      model made an error it can correct when shown the specific discrepancy. Lowering
      thresholds (A) accepts bad data. Batch reprocessing (C) doesn't change the prompt,
      so errors would repeat. Few-shot examples (D) help but don't address the specific
      extraction that already failed.
    docLink:
      text: "Validation and retry loops"
      url: "https://platform.claude.com/docs/en/build-with-claude/tool-use"
    optionLinks:
      A:
        text: "Confidence thresholds and acceptance criteria"
        url: "https://platform.claude.com/docs/en/build-with-claude/overview"
      B:
        text: "Retry-with-error-feedback loops"
        url: "https://platform.claude.com/docs/en/build-with-claude/tool-use"
      C:
        text: "Message Batches API for reprocessing"
        url: "https://platform.claude.com/docs/en/build-with-claude/batch-processing"
      D:
        text: "Few-shot examples for arithmetic extraction"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices"

  - id: d4_batch_sla
    taskStatement: "4.5"
    question: |
      Your document processing pipeline needs to handle 10,000 contracts nightly with
      results available by 8 AM. Processing starts at midnight. The pipeline is not
      blocking any real-time workflows. Which API approach best balances cost and
      requirements?
    options:
      A: "Standard synchronous API with parallel requests for lowest latency and most predictable timing."
      B: "Message Batches API for 50% cost savings, given the 8-hour window and latency tolerance."
      C: "Standard API with rate limiting to stay within quotas while keeping costs predictable."
      D: "Message Batches API with a synchronous fallback for any batch that doesn't complete within 6 hours."
    correct: B
    explanation: |
      The Message Batches API offers 50% cost savings and is appropriate for non-blocking,
      latency-tolerant workloads. With an 8-hour window (midnight to 8 AM) and a maximum
      24-hour processing time, a nightly run submitted at midnight has an excellent chance of
      completing by 8 AM. This is exactly the use case the Batch API was designed for. The
      synchronous API (A, C) sacrifices cost savings unnecessarily. Option D adds unnecessary
      complexity.
    docLink:
      text: "Message Batches API"
      url: "https://platform.claude.com/docs/en/build-with-claude/batch-processing"
