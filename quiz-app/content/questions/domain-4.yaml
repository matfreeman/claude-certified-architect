  - id: d4_verification_confidence_01
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "4.6"
    question: |
      Your CI review system already uses one independent Claude run to inspect each pull
      request. It now emits about 40 findings per day, but human reviewers have time to
      manually validate only 10, and you cannot afford to miss subtle security issues while
      trimming low-value style disputes. Which architecture best supports calibrated routing?
    options:
      A: "Ask the same reviewer pass to report only findings it rates 10/10 confidence, and suppress everything else."
      B: "Replace the reviewer with a larger model and trust its first-pass output without a secondary check."
      C: "Add a second verification pass that reevaluates each finding independently, emits a confidence field, and routes low-confidence or high-impact findings to humans."
      D: "Run three copies of the first-pass reviewer and keep only findings that all three runs agree on."
    correct: C
    explanation: |
      A separate verification pass with a confidence field is the best design here because
      it creates a structured signal for routing scarce human review capacity without relying
      on the original reviewer to judge its own output. Option A uses a vague same-pass
      threshold and risks suppressing subtle but important findings. Option B may improve raw
      quality somewhat, but it does not create a calibrated triage mechanism. Option D
      increases cost and can suppress real issues that appear only in one strong review pass.
    docLink:
      text: "Create custom subagents"
      url: "https://code.claude.com/docs/en/sub-agents"
