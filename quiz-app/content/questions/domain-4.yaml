  - id: d4_batch_resubmit_failed_01
    scenario: "Structured Data Extraction"
    taskStatement: "4.5"
    question: |
      Your nightly batch job processes 18,000 contracts for metadata extraction. This
      morning, 96 requests failed because OCR appended long exhibit text that pushed those
      documents over context limits; the rest completed successfully. Every request already
      includes a `custom_id`. What is the most efficient recovery strategy?
    options:
      A: "Rerun the full batch so successful and failed documents are processed under identical conditions."
      B: "Move the entire workload to the synchronous Messages API because batch processing cannot handle partial failures cleanly."
      C: "Resubmit the same 96 documents unchanged and rely on the batch service to succeed on a later attempt."
      D: "Use `custom_id` to identify only the failed documents, chunk or trim those oversized inputs, and resubmit just that subset."
    correct: D
    explanation: |
      `custom_id` exists so you can correlate individual batch requests and handle failures
      surgically. Resubmitting only the failed documents after modifying the oversized inputs
      minimizes cost and focuses the retry on the real problem. Option A wastes money and
      time rerunning successful work. Option B is incorrect because batch processing does let
      you inspect and retry individual failures. Option C repeats the same oversized inputs,
      so the context-limit failures are likely to recur.
    docLink:
      text: "Batch processing"
      url: "https://platform.claude.com/docs/en/build-with-claude/batch-processing"
