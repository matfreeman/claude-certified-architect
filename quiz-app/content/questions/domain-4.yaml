  - id: d4_feedback_patterns_02
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "4.4"
    question: |
      Your CI reviewer emits structured findings with `file`, `line`, `severity`, and
      `message`. After a month, 41% of findings are dismissed by engineers, but you still
      cannot tell whether false positives come mostly from stale-comment checks, naming
      suggestions, or test-gap detection. You want a feedback loop that will let you
      improve prompts systematically. What change is most effective?
    options:
      A: "Add a `detected_pattern` field to every finding so dismissals can be grouped by the heuristic that triggered them."
      B: "Add a second self-correction pass before posting comments, but keep the same finding schema."
      C: "Lower the posting threshold so only critical findings are emitted."
      D: "Increase the context window so the reviewer sees more surrounding code before each comment."
    correct: A
    explanation: |
      Adding a `detected_pattern` field gives you the structured signal needed to analyze
      dismissal rates by finding type and refine the worst-performing heuristics. That is
      the core feedback-loop design improvement this scenario needs. Option B may reduce
      some noise, but it does not make the dismissal data diagnosable. Option C hides the
      symptom by suppressing output rather than identifying which pattern is failing.
      Option D may help certain cases, but it still does not tell you which detection logic
      is responsible for the false positives.
    docLink:
      text: "Structured outputs"
      url: "https://platform.claude.com/docs/en/build-with-claude/structured-outputs"
    optionLinks:
