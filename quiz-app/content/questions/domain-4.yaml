  - id: d4_retry_absent_source_01
    scenario: "Structured Data Extraction"
    taskStatement: "4.4"
    question: |
      Your contract extraction service returns `vendor_name`, `payment_terms`, and
      `tax_id_reference`. The schema already allows `tax_id_reference` to be null. In 11%
      of contracts, the body says "tax identification will be provided on the attached
      W-9," and your validator currently retries the same PDF three times whenever that
      field is null, appending "you missed tax_id_reference" on each retry. The retries
      rarely recover and occasionally hallucinate IDs. What is the best fix?
    options:
      A: "Keep the retry loop but prepend a stronger instruction that nulls are unacceptable when an attachment is mentioned."
      B: "Treat null as a valid outcome for this source document, and route the case to attachment retrieval or human follow-up instead of reprocessing the same PDF."
      C: "Switch to a larger model so it can infer the likely tax ID from the vendor name and address."
      D: "Add one more retry pass that asks Claude to reason step by step before answering."
    correct: B
    explanation: |
      Retries help when the source contains the needed information and the model made a
      correctable extraction mistake. They do not help when the required data is not
      present in the provided document at all. Treating null as valid for this document and
      retrieving the referenced attachment or routing for follow-up addresses the real
      failure mode without encouraging hallucinations. Option A explicitly pushes the model
      away from the correct null outcome. Option C asks the model to infer a value that is
      not in the source. Option D adds more cost to the same ineffective retry pattern.
    docLink:
      text: "Chain complex prompts"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices#chain-complex-prompts"
    optionLinks:
