  - id: d4_tool_choice_any_01
    scenario: "Structured Data Extraction"
    taskStatement: "4.3"
    question: |
      Your intake service receives a mix of invoices, receipts, and purchase orders from
      email attachments. You expose three extraction tools with different JSON schemas, but
      the workflow currently uses `tool_choice: "auto"`. In 7% of requests, Claude returns
      a prose summary instead of calling any tool, which breaks the downstream parser.
      What is the best fix?
    options:
      A: "Set `tool_choice: \"any\"` so Claude must call one of the available extraction tools while still choosing the right schema for the document."
      B: "Force the invoice extraction tool on every request and remap fields afterward if the document turns out to be a receipt or purchase order."
      C: "Keep `tool_choice: \"auto\"` and add a stronger prompt that says to respond with valid JSON only."
      D: "Post-process prose responses with regex and coerce them into the nearest schema after the fact."
    correct: A
    explanation: |
      `tool_choice: "any"` is the right control when you need guaranteed structured output
      but still want Claude to choose among multiple tools. Option B is wrong because the
      document type is unknown and forcing the wrong schema will create semantic errors.
      Option C remains probabilistic because prompt instructions do not guarantee a tool
      call. Option D treats the symptom after the parser is already broken and is far less
      reliable than enforcing tool use directly.
    docLink:
      text: "Tool use with Claude"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/overview"
