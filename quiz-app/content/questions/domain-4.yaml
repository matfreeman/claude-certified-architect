  - id: d4_fewshot_review_01
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "4.2"
    question: |
      Your GitHub Action posts review findings in a structured template with `location`,
      `issue`, `severity`, and `suggested_fix`. Even with a detailed instruction block,
      borderline cases still come back inconsistently: similar refactors sometimes get
      flagged as missing test coverage, while other runs omit `suggested_fix` entirely.
      What change is most likely to improve consistency?
    options:
      A: "Add 3-5 few-shot examples showing both real test coverage gaps and acceptable refactors, each using the exact output template you want."
      B: "Replace the instructions with a shorter prompt that says to be conservative and return JSON only."
      C: "Add a stricter enum for severity values but leave the prompt without examples."
      D: "Increase the context window so the reviewer can inspect more surrounding files before formatting its findings."
    correct: A
    explanation: |
      Few-shot examples are the most effective way to improve consistency when the failures
      occur in ambiguous cases and in the desired output format itself. Showing both true
      positives and acceptable patterns teaches the model how to generalize its judgment,
      while also reinforcing the required structure for every finding. Option B repeats the
      vague "be conservative" pattern that does not give the model concrete boundaries.
      Option C constrains only one field and does not teach when to raise a finding or how
      to populate the rest of the template. Option D increases available context, but the
      root problem here is inconsistent judgment and formatting rather than missing tokens.
    docLink:
      text: "Use examples effectively"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices#use-examples-effectively"
