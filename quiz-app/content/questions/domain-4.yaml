  - id: d4_fewshot_extraction_02
    scenario: "Structured Data Extraction"
    taskStatement: "4.2"
    question: |
      Your pipeline extracts clinical study details into `sample_size`,
      `primary_endpoint`, `follow_up_period`, and `source_section`. You already provide
      a detailed field-by-field instruction list and a JSON schema, but results are still
      inconsistent across journals: studies with endpoint definitions in appendix tables
      or footnotes often come back with null `source_section` or misassigned fields.
      What improvement would most likely increase first-pass accuracy?
    options:
      A: "Add 2-4 few-shot examples spanning main-text methods sections, appendix tables, and footnote disclosures, with the exact output JSON for each."
      B: "Expand the system prompt with an exhaustive list of section names used by major publishers."
      C: "Mark every field as required so the model is forced to fill them on every paper."
      D: "Run the same prompt twice and accept the value that appears in both responses."
    correct: A
    explanation: |
      Few-shot examples work well for extraction tasks with varied document layouts because
      they show Claude how to map different structures to the same target schema. Diverse
      examples drawn from appendices, tables, and footnotes help the model generalize to
      novel journal formats better than longer instructions alone. Option B is brittle and
      will still miss unexpected layouts. Option C pressures the model to fabricate values
      when information is absent or hard to locate. Option D increases cost and latency
      without teaching the model how to handle the structural variation that is causing the
      errors.
    docLink:
      text: "Use examples effectively"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices#use-examples-effectively"
