  - id: d4_independent_review_01
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "4.6"
    question: |
      Your CI workflow uses one Claude run to generate a large refactor patch and then
      asks that same run to perform the security review before posting merge-blocking
      comments. In postmortems, the review catches obvious syntax issues but repeatedly
      misses subtle authorization regressions that human reviewers later find. Logs show
      the review step often reuses assumptions made during generation. What change most
      directly improves review reliability?
    options:
      A: "Add stronger instructions telling the same session to be skeptical of its own code before reviewing."
      B: "Run the review in a second independent Claude session or teammate that receives only the diff and the review checklist."
      C: "Increase the context window and thinking budget before running the review in the same session."
      D: "Split the same-session review into per-file and integration passes."
    correct: B
    explanation: |
      Independent review works better here because the second Claude instance does not
      inherit the generator's reasoning context. That makes it more willing to question
      design assumptions and catch issues the original session may rationalize away. Option
      A still relies on the same context that produced the code. Option C adds more
      compute, but it does not remove the anchoring effect from the generation step. Option
      D can improve attention across many files, yet it still leaves the same reviewer
      evaluating its own prior reasoning rather than providing an independent check.
    docLink:
      text: "Agent teams"
      url: "https://code.claude.com/docs/en/agent-teams"
