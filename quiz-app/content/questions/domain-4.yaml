  - id: d4_severity_rubric_01
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "4.1"
    question: |
      Your merge-blocking reviewer outputs `severity` as `critical`, `high`, `medium`, or
      `low`. The same missing authorization check is labeled `critical` in one service and
      `medium` in another, while harmless refactors occasionally get marked `high`,
      creating pager noise and inconsistent merge decisions. What prompt change is most
      likely to make severity classification consistent?
    options:
      A: "Ask Claude to explain each severity label in one sentence so reviewers can understand its reasoning."
      B: "Set severity based on the size of the pull request, with larger diffs automatically treated as higher risk."
      C: "Define explicit severity criteria with concrete code examples for each level, including examples of findings that should not be escalated."
      D: "Collect a month of human relabeling data and plan a fine-tune instead of changing the prompt."
    correct: C
    explanation: |
      Explicit severity criteria with concrete examples give the model stable decision
      boundaries, which is exactly what this inconsistent classification problem needs.
      Option A improves auditability but leaves the ambiguous rubric unchanged. Option B uses
      diff size as a proxy for business impact, which is not a reliable severity signal.
      Option D may be useful later, but it delays the prompt-level fix and over-engineers
      the response to a problem that should first be addressed with clearer criteria.
    docLink:
      text: "Prompt engineering overview"
