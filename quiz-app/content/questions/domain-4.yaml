# Domain 4: Prompt Engineering & Structured Output (20%)
# Add new questions by appending to the `questions` list below.

questions:

  - id: q3
    scenario: "Customer Support Resolution Agent"
    taskStatement: "4.1"
    question: |
      Your agent achieves 55% first-contact resolution, well below the 80% target. Logs
      show it escalates straightforward cases (standard damage replacements with photo
      evidence) while attempting to autonomously handle complex situations requiring
      policy exceptions. What's the most effective way to improve escalation calibration?
    options:
      A: "Add explicit escalation criteria to your system prompt with few-shot examples demonstrating when to escalate versus resolve autonomously."
      B: "Have the agent self-report a confidence score (1-10) before each response and automatically route requests to humans when confidence falls below a threshold."
      C: "Deploy a separate classifier model trained on historical tickets to predict which requests need escalation before the main agent begins processing."
      D: "Implement sentiment analysis to detect customer frustration levels and automatically escalate when negative sentiment exceeds a threshold."
    correct: A
    explanation: |
      Adding explicit escalation criteria with few-shot examples directly addresses the root
      cause: unclear decision boundaries. This is the proportionate first response before
      adding infrastructure. Option B fails because LLM self-reported confidence is poorly
      calibrated. Option C is over-engineered, requiring labeled data and ML infrastructure
      when prompt optimization hasn't been tried. Option D solves a different problem;
      sentiment doesn't correlate with case complexity.
    docLink:
      text: "Prompt engineering best practices"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
    optionLinks:
      A:
        text: "Explicit criteria and few-shot examples"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices"
      B:
        text: "LLM confidence scores — limitations"
        url: "https://platform.claude.com/docs/en/build-with-claude/overview"
      C:
        text: "Classifier models for routing"
        url: "https://platform.claude.com/docs/en/build-with-claude/overview"
      D:
        text: "Sentiment analysis as an escalation signal"
        url: "https://platform.claude.com/docs/en/build-with-claude/overview"

  - id: q11
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "4.5"
    question: |
      Your team runs two workflows: (1) a blocking pre-merge check that must complete
      before developers can merge, and (2) a technical debt report generated overnight
      for review the next morning. Your manager proposes switching both to the Message
      Batches API for its 50% cost savings. How should you evaluate this proposal?
    options:
      A: "Use batch processing for the technical debt reports only; keep real-time calls for pre-merge checks."
      B: "Switch both workflows to batch processing with status polling to check for completion."
      C: "Keep real-time calls for both workflows to avoid batch result ordering issues."
      D: "Switch both to batch processing with a timeout fallback to real-time if batches take too long."
    correct: A
    explanation: |
      The Message Batches API offers 50% cost savings but has processing times up to 24 hours
      with no guaranteed latency SLA. This makes it unsuitable for blocking pre-merge checks
      where developers wait for results, but ideal for overnight batch jobs like technical
      debt reports. Option B is wrong because "often faster" completion isn't acceptable for
      blocking workflows. Option C reflects a misconception — batch results can be correlated
      using custom_id fields. Option D adds unnecessary complexity.
    docLink:
      text: "Message Batches API"
      url: "https://platform.claude.com/docs/en/build-with-claude/batch-processing"
    optionLinks:
      A:
        text: "Batch API — latency-tolerant workloads"
        url: "https://platform.claude.com/docs/en/build-with-claude/batch-processing"
      B:
        text: "Batch API status polling"
        url: "https://platform.claude.com/docs/en/build-with-claude/batch-processing"
      C:
        text: "Batch result correlation with custom_id"
        url: "https://platform.claude.com/docs/en/build-with-claude/batch-processing"
      D:
        text: "Hybrid batch/real-time architectures"
        url: "https://platform.claude.com/docs/en/build-with-claude/batch-processing"

  - id: q12
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "4.6"
    question: |
      A pull request modifies 14 files across the stock tracking module. A single-pass
      review produces inconsistent results: detailed feedback for some files, superficial
      comments for others, obvious bugs missed, and contradictory feedback — flagging a
      pattern as problematic in one file while approving the same pattern in another.
      How should you restructure the review?
    options:
      A: "Split into focused passes: analyze each file individually for local issues, then run a separate integration-focused pass examining cross-file data flow."
      B: "Require developers to split large PRs into smaller submissions of 3-4 files before automated review runs."
      C: "Switch to a higher-tier model with a larger context window to give all 14 files adequate attention in one pass."
      D: "Run three independent review passes on the full PR and only flag issues that appear in at least two of the three runs."
    correct: A
    explanation: |
      Splitting reviews into focused passes directly addresses the root cause: attention
      dilution when processing many files at once. File-by-file analysis ensures consistent
      depth, while a separate integration pass catches cross-file issues. Option B shifts
      burden to developers without improving the system. Option C misunderstands that larger
      context windows don't solve attention quality issues. Option D would suppress detection
      of real bugs by requiring consensus on issues that may only be caught intermittently.
    docLink:
      text: "Multi-pass review architectures"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
    optionLinks:
      A:
        text: "Multi-pass focused review patterns"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
      B:
        text: "PR size limits and developer workflows"
        url: "https://code.claude.com/docs/en/github-actions"
      C:
        text: "Context window size vs attention quality"
        url: "https://platform.claude.com/docs/en/build-with-claude/overview"
      D:
        text: "Consensus voting in multi-pass review"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"

  - id: d4_fewshot_extract
    taskStatement: "4.2"
    question: |
      Your document extraction system handles invoices from multiple vendors. Some vendors
      use narrative descriptions ("approximately 5 gallons at $3.20/gallon"), others use
      structured tables. The model frequently returns null for values that exist only in
      narrative form. What improvement would have the most impact?
    options:
      A: "Add format normalization rules to the system prompt describing each possible vendor format."
      B: "Add few-shot examples demonstrating correct extraction from both narrative descriptions and structured table formats."
      C: "Split the extraction into two sequential passes: one for structured data, one for narrative content."
      D: "Use a stricter JSON schema with enum constraints to guide the model toward expected value formats."
    correct: B
    explanation: |
      Few-shot examples are the most effective technique for reducing hallucination and
      improving extraction from varied document structures. Examples showing extraction from
      both narrative and structured formats enable the model to generalize judgment to novel
      patterns rather than only matching pre-specified cases. Format normalization rules (A)
      help but are less effective than concrete examples. Two-pass extraction (C) adds
      complexity. Stricter schemas (D) constrain output format but don't help the model find
      values in narrative text.
    docLink:
      text: "Few-shot prompting guide"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices"
    optionLinks:
      A:
        text: "Format normalization in system prompts"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
      B:
        text: "Few-shot examples for varied document formats"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices"
      C:
        text: "Multi-pass sequential extraction"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
      D:
        text: "JSON schema constraints for structured output"
        url: "https://platform.claude.com/docs/en/build-with-claude/tool-use"

  - id: d4_nullable
    taskStatement: "4.3"
    question: |
      Your invoice extraction schema marks discount_amount as a required field. In
      production, documents without discounts cause the model to fabricate values like
      "$0.00" rather than returning null. What is the correct fix?
    options:
      A: "Add a system prompt instruction: 'If a discount field is not present, return 0 for the discount_amount.'"
      B: "Change discount_amount to optional/nullable in the JSON schema."
      C: "Add a few-shot example showing correct extraction from a document that has no discount."
      D: "Use an enum field for discount_amount with '0' as a valid option."
    correct: B
    explanation: |
      Schema fields should be designed as optional/nullable when source documents may not
      contain the information. Required fields pressure the model to fabricate values to
      satisfy the schema constraint. Making the field nullable signals that null is the
      correct response when the information is absent. A system prompt instruction (A) is
      a probabilistic fix. A few-shot example (C) helps but doesn't address the root
      structural cause. An enum (D) is for categorical values, not for handling absent fields.
    docLink:
      text: "Structured output with tool use"
      url: "https://platform.claude.com/docs/en/build-with-claude/tool-use"
    optionLinks:
      A:
        text: "System prompt instructions for absent fields"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
      B:
        text: "Optional/nullable fields in JSON schema"
        url: "https://platform.claude.com/docs/en/build-with-claude/tool-use"
      C:
        text: "Few-shot examples for missing data"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices"
      D:
