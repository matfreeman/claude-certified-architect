  - id: d4_explicit_criteria
    taskStatement: "4.1"
    question: |
      Your CI code review tool has high false positive rates for comment accuracy checks,
      causing developers to distrust all its findings. You've tried instructions like
      "only report high-confidence findings" and "be conservative." Neither has improved
      precision. What is the most effective next step?
    options:
      A: "Switch to a more powerful model with better calibration."
      B: "Temporarily disable comment accuracy checks entirely while developing more precise criteria."
      C: "Define explicit, categorical review criteria specifying exactly which comment issues to flag (e.g., 'flag only when claimed behavior directly contradicts actual code behavior') and which to skip."
      D: "Reduce the scope of review to only the most recently changed lines."
    correct: C
    explanation: |
      General instructions like "be conservative" fail to improve precision because they don't
      give the model specific decision criteria. Explicit categorical criteria (e.g., "flag
      comments only when claimed behavior contradicts actual code behavior") provide concrete
      rules the model can apply consistently. High false-positive categories also undermine
      confidence in accurate categories — option B is a valid tactical step while improving
      prompts, but C is the root cause fix.
    docLink:
      text: "Prompt engineering: explicit criteria"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
    optionLinks:
      A:
        text: "Model selection and calibration"
        url: "https://platform.claude.com/docs/en/build-with-claude/overview"
      B:
        text: "Disabling checks while iterating on prompts"
        url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
      C:
        text: "Explicit categorical criteria for precision"
