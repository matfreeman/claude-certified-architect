  - id: d4_tooluse_enum
    scenario: "Structured Data Extraction"
    taskStatement: "4.3"
    question: |
      Your insurance claim extraction system uses a tool_use schema with a required enum
      field for claim_type: ["auto", "home", "health", "life"]. In production, 6% of claims
      are for niche categories (pet insurance, travel, umbrella policies). The model forces
      these into the closest standard category, causing downstream routing errors. What is
      the most effective schema change?
    options:
      A: "Add all known niche categories to the enum list to cover every possible claim type."
      B: "Remove the enum constraint entirely and make claim_type a free-text string field."
      C: "Add an 'other' value to the enum and include a companion claim_type_detail string field for the model to specify the actual category."
      D: "Add a pre-processing step that classifies claims into the four categories before extraction."
    correct: C
    explanation: |
      The "other" + detail string pattern is a documented best practice for extensible
      categorization in extraction schemas. It preserves the benefits of enum validation for
      common cases (auto, home, health, life) while gracefully handling edge cases without
      forcing incorrect classifications. Adding all niche categories (A) is fragile and
      requires constant maintenance as new types appear. Free-text strings (B) sacrifice all
      validation benefits. A pre-processing classifier (D) adds complexity and still needs to
      handle the same edge cases.
    docLink:
      text: "Structured output with tool use"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/overview"
    optionLinks:
      A:
        text: "Enum constraints in JSON schemas"
        url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/overview"
      B:
        text: "Free-text vs constrained fields"
        url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/overview"
      C:
        text: "Extensible enum patterns — 'other' + detail"
        url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/overview"
      D:
