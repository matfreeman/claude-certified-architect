  - id: d4_noisy_category_disable_01
    scenario: "Claude Code for Continuous Integration"
    taskStatement: "4.1"
    question: |
      Your automated PR reviewer comments on SQL injection risks, authorization bypasses,
      and stale comments across 220 pull requests each week. Security findings are
      dismissed only 8% of the time, but stale-comment warnings are dismissed 66% of the
      time, and developers have started ignoring the whole bot. While you refine the weak
      prompt, what is the best immediate step to restore trust?
    options:
      A: "Add a stronger instruction telling the reviewer to report findings only when it is highly confident."
      B: "Temporarily disable stale-comment findings, keep the higher-precision security categories live, and iterate on the noisy category separately."
      C: "Move all findings into a single end-of-PR summary so developers see fewer inline comments."
      D: "Switch the workflow to a larger model so all categories improve at the same time."
    correct: B
    explanation: |
      Temporarily disabling the high-false-positive category is the proportionate fix because
      noisy findings are eroding trust in categories that are already performing well.
      Option A repeats the vague "high confidence" instruction pattern, which does not give
      the model clearer decision boundaries. Option C changes presentation but leaves the bad
      stale-comment judgments intact. Option D is expensive and still avoids the actual
      prompt-design problem causing the false positives.
    docLink:
      text: "Prompt engineering overview"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
