  - id: d4_tool_choice_forced_01
    scenario: "Structured Data Extraction"
    taskStatement: "4.3"
    question: |
      Your accounts-payable pipeline always processes invoices, not mixed document types.
      The first turn must extract `invoice_number`, `vendor_name`, and `due_date` into a
      JSON payload before a second step enriches the vendor record in your ERP. You expose
      both `extract_invoice_metadata` and `enrich_vendor_record` as tools in the same
      request, and in 9% of runs Claude calls the enrichment tool first using guessed
      vendor names from the document text. What change most reliably enforces the required
      first step?
    options:
      A: "Set `tool_choice: \"any\"` so Claude must call one of the available tools before responding."
      B: "Set `tool_choice: {\"type\": \"tool\", \"name\": \"extract_invoice_metadata\"}` for the extraction turn, then run enrichment only after you receive the structured fields."
      C: "Keep `tool_choice: \"auto\"` and strengthen the prompt with 'always extract metadata before any enrichment.'"
      D: "Set `strict: true` on both tools while keeping `tool_choice: \"auto\"` so schema validation forces Claude to start with extraction."
    correct: B
    explanation: |
      For a workflow where a specific extraction step must happen before later enrichment,
      forcing the named tool is the deterministic control Anthropic documents for
      `tool_choice`. It guarantees Claude starts with `extract_invoice_metadata`, after
      which your application can execute the enrichment step using the validated fields.
      Option A only guarantees that some tool is called, so Claude could still choose
      `enrich_vendor_record` first. Option C is a prompt-only instruction and therefore
      probabilistic rather than enforced. Option D confuses strict schema validation with
      tool selection: `strict: true` constrains the inputs of a chosen tool, but it does
      not make Claude choose the extraction tool first.
    docLink:
      text: "Define tools: forcing tool use"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/define-tools"
