  - id: d5_case_facts_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "5.1"
    question: |
      Your support agent has been working a billing-and-shipping case for 12 turns.
      Early in the conversation the customer said, "If order 44192 does not arrive
      before May 12, refund the $148 expedited shipping charge and cancel the
      replacement." After two rounds of progressive summarization, the active prompt
      now only says "customer wants compensation for delayed shipment," and the agent
      proposes a $20 credit after the replacement ships. Which change most directly
      preserves the critical details across the long interaction?
    options:
      A: "Use /compact more frequently so the conversation stays shorter."
      B: "Extract order numbers, amounts, deadlines, and explicit customer expectations into a persistent structured case-facts block included with each turn outside the running summary."
      C: "Raise max_tokens so the full transcript remains in context for more turns."
      D: "Ask the customer to reconfirm the important details every time the agent calls a tool."
    correct: B
    explanation: |
      B is correct because progressive summarization often blurs the exact values that
      matter operationally, such as order IDs, dollar amounts, dates, and explicit
      customer expectations. A persistent case-facts block keeps those transactional
      facts precise even when the narrative history is summarized. A only compresses the
      conversation and does not guarantee that critical details remain explicit. C may
      delay context pressure, but it does not solve the root problem that the summary has
      already become vague. D pushes a system design problem back onto the customer and
      creates unnecessary friction in a case the agent should be able to track correctly.
