  - id: d5_resume_manifest_01
    scenario: "Developer Productivity with Claude"
    taskStatement: "5.4"
    question: |
      Your internal codebase investigation assistant uses a coordinator plus three
      subagents. After 90 minutes it has read 52 files, identified the refund flow, and
      built a dependency map, but the process crashes before it writes the final
      diagnosis. When you restart, `--resume` restores the chat transcript, yet key tool
      outputs are stale and the subagents do not know which findings were already
      validated. What design best supports reliable recovery?
    options:
      A: "Rely on `--resume` alone and tell the coordinator to reread whatever seems important."
      B: "Run `/compact` every 10 minutes so the crash loses less conversational detail."
      C: "Have each agent print free-form notes in chat responses and manually copy the relevant text into the next prompt."
      D: "Require each agent to export structured state to a known location and have the coordinator load a manifest of those state files on resume before re-injecting the findings into fresh prompts."
    correct: D
    explanation: |
      D is correct because reliable crash recovery depends on structured state persistence
      outside the transient chat history. A manifest gives the coordinator a deterministic
      way to reload what each agent already discovered and validated, even when old tool
      results are stale. A assumes the transcript alone is trustworthy, which is risky
      after code or environment changes. B reduces context pressure but does not create a
      recoverable state snapshot. C creates an unstructured manual process that is brittle
      and easy to misapply under time pressure.
