  - id: d5_methodology_context_01
    scenario: "Multi-Agent Research System"
    taskStatement: "5.6"
    question: |
      Your research pipeline is preparing an executive brief about database migration
      performance. One source is a vendor benchmark showing 42% faster queries on a
      synthetic workload, another is a customer case study showing 17% improvement in
      production, and a third is an analyst note calling the gains "material" without a
      percentage. The synthesis agent currently outputs "performance improves about 42%"
      with three citations. What change best preserves provenance and uncertainty?
    options:
      A: "Prefer the highest numeric improvement because it is the most concrete claim."
      B: "Average the available percentages and cite the non-numeric analyst note as supporting evidence."
      C: "Preserve the original source characterizations and methodological context, and place performance claims in a contested or qualified section instead of collapsing them into one consensus number."
      D: "Drop the analyst note and keep only the two numeric sources so the synthesis remains uniform."
    correct: C
    explanation: |
      C is correct because these sources differ in methodology and evidentiary strength,
      so collapsing them into one headline number destroys the context needed to interpret
      them correctly. A cherry-picks the strongest claim without regard to workload or
      environment. B invents a blended statistic that no source actually reported and
      misuses a qualitative source as numeric support. D removes potentially useful context
      instead of preserving uncertainty and letting readers see why the claims differ.
