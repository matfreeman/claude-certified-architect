  - id: d5_content_rendering_01
    scenario: "Multi-Agent Research System"
    taskStatement: "5.6"
    question: |
      Your final market brief combines audited revenue by quarter, last-week product
      launch news, and technical findings from engineering blogs. Reviewers say the
      current output is hard to trust because the synthesis agent converts everything into
      uniform prose paragraphs, hiding which data is tabular, which claims are
      time-sensitive, and which findings are implementation details. What is the best
      improvement?
    options:
      A: "Instruct the synthesis agent to render each content type in the format that matches it: financial figures as tables, recent news as dated prose, and technical findings as structured lists with preserved citations."
      B: "Convert every source into the same JSON object structure and present the JSON directly to readers."
      C: "Use a single long narrative paragraph so all evidence is interpreted in one consistent voice."
      D: "Put every source into a table, including narrative news and technical caveats, so the report has one uniform layout."
    correct: A
    explanation: |
      A is correct because preserving structure that matches the source type makes the
      final synthesis easier to audit and less likely to hide uncertainty. Tables help
      readers inspect financial figures, dated prose communicates time-sensitive news, and
      structured lists suit technical findings with caveats. B may help internal machine
      processing, but raw JSON is not the best human-facing synthesis format and still
      flattens nuance. C further obscures distinctions that reviewers need to evaluate
      trustworthiness. D forces all evidence into a format that fits some content poorly
      and makes narrative caveats harder to read.
    docLink:
      text: "Prompt engineering overview"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/overview"
