  - id: d5_error_recovery_02
    scenario: "Multi-Agent Research System"
    taskStatement: "5.3"
    question: |
      Your market-intelligence coordinator asks a news subagent to gather export-control
      updates from two paid feeds and web search. In 18% of runs, one paid feed returns
      HTTP 429 for 30-60 seconds, and the subagent immediately bubbles the error to the
      coordinator. The coordinator restarts the whole workflow, adding 90 seconds and
      duplicate tool calls even though other sources were already collected. What change
      best improves reliability?
    options:
      A: "Configure the coordinator to rerun the entire workflow twice whenever any subagent errors."
      B: "Treat the rate limit as a valid empty result if at least one other source returned data."
      C: "Have the subagent perform local recovery for transient failures, such as backoff retries or switching to the alternate source, and propagate an unresolved error only with what it already tried and any partial results."
      D: "Remove the paid feed from the subagent so only the more reliable web search tool remains."
    correct: C
    explanation: |
      C is correct because transient failures should be handled locally when possible, with
      unresolved errors propagated only after the subagent reports what it tried and what it
      was still able to collect. A wastes time and money by rerunning healthy parts of the
      workflow. B is incorrect because a rate limit is an access failure, not a legitimate
      "no matches" result. D reduces coverage permanently instead of fixing the recovery path
      for intermittent failures.
    docLink:
      text: "Tool Runner (SDK)"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/tool-runner"
    optionLinks:
