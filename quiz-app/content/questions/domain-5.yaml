  - id: d5_full_history_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "5.1"
    question: |
      Your team built a custom Messages API loop for a support agent that handles order
      lookups and returns. In 18% of follow-up turns, customers say things like "cancel
      it instead" or "use the other order," and the agent either repeats the previous tool
      call or asks what "it" refers to. Logs show the app sends only the newest user
      message and latest tool result on each follow-up request to save tokens. What is the
      best fix?
    options:
      A: "Increase max_tokens and move to a larger context window so the model can infer the missing earlier turns."
      B: "Keep only a one-paragraph running summary in the system prompt and omit earlier assistant and tool blocks."
      C: "Switch the workflow to the Message Batches API so each conversation is processed as an asynchronous batch."
      D: "Append the full prior conversation state on each follow-up request, including assistant responses and any tool_result or compaction blocks, then compact deliberately only when needed."
    correct: D
    explanation: |
      D is correct because the Messages API is stateless: coherent multi-turn behavior
      depends on the client resending the prior conversation state, including assistant
      content and any tool-related or compaction blocks that carry the active context
      forward. A treats the symptom instead of the cause, because a larger context window
      does nothing if the missing turns are never sent back to the API. B is too lossy for
      references like "it" and can also discard structured blocks the model needs to
      continue the workflow correctly. C addresses throughput and asynchronous processing,
      not conversational coherence in a live multi-turn support session.
    docLink:
      text: "Tutorial: Build a tool-using agent"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/build-a-tool-using-agent"
