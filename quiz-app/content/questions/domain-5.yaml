        url: "https://code.claude.com/docs/en/context-window"

  - id: d5_error_context_01
    scenario: "Multi-Agent Research System"
    taskStatement: "5.3"
    question: |
      Your coordinator agent is assembling a semiconductor market brief from three
      subagents. The filings subagent returns `status: failed, message: "search unavailable"`
      after trying two SEC queries, while the web and analyst-note subagents succeed.
      Because the error payload has no detail, the coordinator cannot decide whether to
      retry, narrow the search, or continue with partial coverage. What change most
      improves recovery?
    options:
      A: "Increase the filings subagent timeout from 15 seconds to 60 seconds so fewer errors reach the coordinator."
      B: "Return structured error context that includes the failure type, attempted queries, any partial results, and possible fallback approaches so the coordinator can choose the next step intelligently."
      C: "Convert all source failures into empty successful results so synthesis can continue without interruption."
      D: "Abort the entire workflow whenever any single source lookup fails to avoid incomplete reports."
    correct: B
    explanation: |
      B is correct because the coordinator needs structured error context to make a recovery
      decision: what failed, what was attempted, whether anything usable was found, and what
      fallback is still available. A may reduce some timeouts, but it does not solve the core
      problem that the coordinator lacks actionable failure detail. C is an anti-pattern
      because it hides access failures and makes them indistinguishable from legitimate empty
      results. D overreacts to a single-source failure and prevents the coordinator from
      proceeding with partial coverage when that would still be useful.
    docLink:
      text: "Handle tool calls"
      url: "https://platform.claude.com/docs/en/agents-and-tools/tool-use/handle-tool-calls"
