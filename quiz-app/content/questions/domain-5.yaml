  - id: d5_sampling_02
    scenario: "Structured Data Extraction"
    taskStatement: "5.5"
    question: |
      Six weeks after reducing manual review, your invoice extraction system now
      auto-approves 82% of documents above 0.98 confidence. A new supplier template in the
      APAC region swaps tax ID and invoice number, but because those records still score high
      confidence, the issue is discovered only after finance reconciliation. What ongoing
      control most directly catches this kind of drift without sending everything back to
      humans?
    options:
      A: "Use stratified random sampling of high-confidence extractions by document type, region, and critical field to measure live error rates and catch novel patterns."
      B: "Return all high-confidence documents to full human review for one week each quarter."
      C: "Lower the approval threshold globally until no sampled errors are found."
      D: "Require the model to explain its reasoning before every extraction so reviewers can inspect the longer output."
    correct: A
    explanation: |
      A is correct because stratified sampling checks whether the supposedly safe segment is
      still performing well across the slices that matter, which is how you catch drift and
      new templates that a confidence threshold misses. B is expensive and leaves long blind
      periods between review windows. C treats the symptom globally instead of measuring where
      the real problem sits. D increases output volume but does not create a reliable ongoing
      measurement loop for high-confidence extractions.
    docLink:
      text: "Define success criteria and build evaluations"
      url: "https://platform.claude.com/docs/en/test-and-evaluate/develop-tests#eval-design-principles"
