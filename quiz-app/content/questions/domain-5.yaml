  - id: d5_calibration_01
    scenario: "Structured Data Extraction"
    taskStatement: "5.5"
    question: |
      Your extraction pipeline processes 40,000 vendor onboarding forms per day.
      A single document-level confidence score of 0.97 is used to auto-approve records,
      but post-audit shows bank routing numbers are wrong on 6% of handwritten forms even
      when overall document confidence stays above 0.95 because names and addresses extract
      correctly. What is the best fix?
    options:
      A: "Raise the document-level auto-approval threshold from 0.95 to 0.99 for all forms."
      B: "Ask the model to produce a prose explanation of uncertainty instead of structured values."
      C: "Run two additional extraction passes and auto-approve whichever value appears most often."
      D: "Have the model emit field-level confidence scores and calibrate review thresholds against a labeled validation set so high-risk fields can be reviewed separately."
    correct: D
    explanation: |
      D is correct because the failure is field-specific, so review routing also needs to be
      field-specific. Structured outputs let you emit per-field confidence, and calibration on
      labeled validation data helps you set thresholds that reflect real error rates. A still
      relies on one coarse score and may either miss bad routing numbers or over-review safe
      documents. B replaces machine-readable signals with vague prose that is harder to route
      on consistently. C adds cost and complexity without proving that majority agreement
      corresponds to calibrated accuracy for the risky field.
    docLink:
      text: "Get structured output from agents"
      url: "https://code.claude.com/docs/en/agent-sdk/structured-outputs"
    optionLinks:
