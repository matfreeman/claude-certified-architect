  - id: d5_conflict_dates_01
    scenario: "Multi-Agent Research System"
    taskStatement: "5.6"
    question: |
      Your research pipeline is building a market brief for executives. The synthesis
      agent receives two credible figures for active users: 1.8 million from a Q4 2025
      shareholder letter and 2.4 million from a March 2026 analyst note, but the current
      report template forces one numeric value per metric. Reviewers keep flagging the brief
      as inconsistent. What should the synthesis layer do?
    options:
      A: "Prefer the newest figure automatically and remove the older one so the report contains a single clean number."
      B: "Average the two figures and cite both sources to avoid showing a conflict."
      C: "Preserve both figures with source attribution and publication dates, explain that the difference may be temporal rather than contradictory, and mark the metric as contested until it is reconciled."
      D: "Choose the figure repeated by more secondary articles because frequency is the best proxy for correctness."
    correct: C
    explanation: |
      C is correct because credible sources can differ for valid reasons, including different
      publication dates. The synthesis layer should preserve the claim-source mapping, keep
      the dates, and present the metric as contested rather than fabricating certainty. A
      discards relevant evidence just to force a single answer. B invents a blended value that
      neither source actually reported. D treats repetition as proof and can amplify the wrong
      source instead of preserving provenance.
    docLink:
      text: "Citations"
      url: "https://platform.claude.com/docs/en/build-with-claude/citations"
    optionLinks:
      A:
        text: "Search results"
        url: "https://platform.claude.com/docs/en/build-with-claude/search-results"
      B:
        text: "Citations"
        url: "https://platform.claude.com/docs/en/build-with-claude/citations"
