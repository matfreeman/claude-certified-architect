  - id: d5_escalation_criteria_01
    scenario: "Customer Support Resolution Agent"
    taskStatement: "5.2"
    question: |
      Your support agent escalates 37% of angry-sounding password-reset chats even
      though it can usually solve them in one turn, but it sometimes handles calm-sounding
      edge cases like competitor price matching without human review. Investigation shows
      the system prompt says to escalate when the customer's sentiment is very negative
      or when the model feels less than 70% confident. What is the best fix?
    options:
      A: "Raise the sentiment threshold so only the angriest messages escalate."
      B: "Keep confidence-based escalation, but add a self-check asking the model to explain why it feels uncertain."
      C: "Replace sentiment and self-confidence heuristics with explicit escalation criteria and few-shot examples covering human requests, policy gaps, and inability to make meaningful progress."
      D: "Train a separate sentiment classifier and use its score instead of Claude's own judgment."
    correct: C
    explanation: |
      C is correct because sentiment and self-reported confidence are unreliable proxies
      for whether a case should be escalated. The prompt should anchor behavior to real
      escalation triggers such as explicit human requests, policy ambiguity, and inability
      to make meaningful progress, with examples showing the boundary. A still tunes the
      wrong signal. B remains probabilistic because it still relies on the model's own
      confidence estimate rather than explicit policy. D formalizes the same bad proxy:
      angry tone does not reliably map to true ambiguity or escalation need.
    docLink:
      text: "Claude prompting best practices"
      url: "https://platform.claude.com/docs/en/build-with-claude/prompt-engineering/claude-prompting-best-practices"
